<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog - ShopCart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <span class="logo navbar-brand">🛒 ShopCart</span>
        <div class="d-flex align-items-center gap-3">
            <span id="welcomeMsg" class="text-muted small"></span>
            <a href="cart.html" class="btn btn-outline-secondary btn-sm">
                Cart (<span id="cartCount">0</span>)
            </a>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- PRODUCT GRID  (Bootstrap Grid: row + col) -->
    <div class="container my-4">
        <h4 class="text-center mb-4">Our Products</h4>

        <div class="row g-4">

            <!-- Product 1 -->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <div class="product-image">
                        <img src="https://avstore.in/cdn/shop/files/1.AVStore-Sonos-Ace-Front-Angled-View-Hero-Black.jpg?v=1725620870"
                             alt="Wireless Headphones">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">Wireless Headphones</h6>
                        <p class="text-primary fw-bold">₹2,499</p>
                        <button class="btn btn-primary btn-sm mt-auto"
                                onclick="addToCart('Wireless Headphones', 2499)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <div class="product-image">
                        <img src="https://gourban.in/cdn/shop/files/Pulse.jpg?v=1749553994&width=2048"
                             alt="Smart Watch">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">Smart Watch</h6>
                        <p class="text-primary fw-bold">₹3,999</p>
                        <button class="btn btn-primary btn-sm mt-auto"
                                onclick="addToCart('Smart Watch', 3999)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <div class="product-image">
                        <img src="https://www.campusshoes.com/cdn/shop/files/VESPER_VESPER_WHT-MILKY_BLU_07.webp?v=1758174807"
                             alt="Running Shoes">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">Running Shoes</h6>
                        <p class="text-primary fw-bold">₹1,299</p>
                        <button class="btn btn-primary btn-sm mt-auto"
                                onclick="addToCart('Running Shoes', 1299)">Add to Cart</button>
                    </div>
                </div>
            </div>

            <!-- Product 4 -->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <div class="product-image">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJzVJmYch065vz3r17fNZgH1qVbrL9kZG0Dw&s"
                             alt="Backpack">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title">Backpack</h6>
                        <p class="text-primary fw-bold">₹899</p>
                        <button class="btn btn-primary btn-sm mt-auto"
                                onclick="addToCart('Backpack', 899)">Add to Cart</button>
                    </div>
                </div>
            </div>

        </div><!-- end .row -->
    </div>

    <script src="app.js"></script>
    <script>
        loadDashboard();
        updateCartCount();
    </script>
</body>
</html>
