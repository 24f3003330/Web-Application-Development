<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopCart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <span class="logo navbar-brand">🛒 ShopCart</span>
        <a href="register.html" class="btn btn-outline-primary btn-sm">Register</a>
    </nav>

    <!-- LOGIN CARD -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
        <div class="card p-4 shadow-sm" style="width: 100%; max-width: 380px;">

            <h4 class="text-center mb-3">Login</h4>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="loginEmail" type="email" class="form-control" placeholder="your@email.com">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input id="loginPassword" type="password" class="form-control" placeholder="Password">
            </div>

            <button class="btn btn-primary w-100" onclick="login()">Login</button>

            <p class="text-center mt-3 text-muted small">
                No account? <a href="register.html">Register here</a>
            </p>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
