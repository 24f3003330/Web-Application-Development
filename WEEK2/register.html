<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ShopCart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <span class="logo navbar-brand">🛒 ShopCart</span>
        <a href="index.html" class="btn btn-outline-primary btn-sm">Login</a>
    </nav>

    <!-- REGISTER CARD -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
        <div class="card p-4 shadow-sm" style="width: 100%; max-width: 380px;">

            <h4 class="text-center mb-3">Create Account</h4>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input id="name" type="text" class="form-control" placeholder="John Doe">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="email" type="email" class="form-control" placeholder="your@email.com">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input id="password" type="password" class="form-control" placeholder="Create a password">
            </div>

            <button class="btn btn-primary w-100" onclick="register()">Sign Up</button>

            <p class="text-center mt-3 text-muted small">
                Already have an account? <a href="index.html">Login here</a>
            </p>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
