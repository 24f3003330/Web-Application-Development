<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - ShopCart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <span class="logo navbar-brand">🛒 ShopCart</span>
        <div class="d-flex gap-2">
            <a href="catalog.html" class="btn btn-outline-secondary btn-sm">Continue Shopping</a>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- CART PAGE -->
    <div class="container my-4" style="max-width: 650px;">
        <h4 class="mb-4">Your Shopping Cart</h4>

        <!-- Cart items filled by app.js -->
        <div id="cartItems" class="card p-3 mb-3">
            <p class="text-muted mb-0">Your cart is empty.</p>
        </div>

        <!-- Summary -->
        <div class="card p-3">
            <div id="total" class="fw-bold fs-5 text-end mb-3">Total: ₹0</div>
            <button class="btn btn-primary w-100" onclick="checkout()">Proceed to Checkout</button>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        loadCart();
    </script>
</body>
</html>
