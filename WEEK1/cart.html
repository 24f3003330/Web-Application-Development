<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - ShopCart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR (Flexbox) -->
    <nav class="navbar">
        <div class="logo">🛒 ShopCart</div>
        <div class="nav-links">
            <a href="catalog.html">Continue Shopping</a>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- CART PAGE (Flexbox) -->
    <div class="cart-page">

        <h2>Your Shopping Cart</h2>

        <!-- Cart items go here (filled by app.js) -->
        <div id="cartItems" class="cart-items">
            <p>Your cart is empty.</p>
        </div>

        <!-- Total + Checkout button -->
        <div class="cart-summary">
            <div class="total-price" id="total">Total: ₹0</div>
            <button class="btn-primary" onclick="checkout()">Proceed to Checkout</button>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        loadCart();
    </script>

</body>
</html>
